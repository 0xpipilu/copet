<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Pets</title>
    <style>
      :root {
        --bg: #f6f8fd;
        --bg-strong: #eef3ff;
        --surface: rgba(255, 255, 255, 0.74);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --surface-border: rgba(14, 28, 68, 0.08);
        --ink: #08101f;
        --muted: rgba(8, 16, 31, 0.56);
        --muted-strong: rgba(8, 16, 31, 0.72);
        --accent: #6d86ff;
        --accent-soft: rgba(109, 134, 255, 0.16);
        --shadow: 0 28px 80px rgba(78, 106, 187, 0.12);
        --radius-xl: 32px;
        --radius-lg: 24px;
        --radius-md: 18px;
        --max-width: 1520px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "SF Pro Display", "Helvetica Neue", "Avenir Next", sans-serif;
        background:
          radial-gradient(circle at 10% 14%, rgba(207, 223, 255, 0.88), transparent 30%),
          radial-gradient(circle at 86% 18%, rgba(212, 222, 255, 0.8), transparent 28%),
          radial-gradient(circle at 50% 120%, rgba(175, 196, 255, 0.3), transparent 36%),
          linear-gradient(180deg, #fbfcff 0%, var(--bg) 46%, var(--bg-strong) 100%);
      }

      body.modal-open {
        overflow: hidden;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        border: 0;
        background: transparent;
        color: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page-shell {
        position: relative;
        width: min(calc(100% - 28px), var(--max-width));
        margin: 0 auto;
        padding: 22px 0 44px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 20px;
        padding: 16px 18px;
        border: 1px solid var(--surface-border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.48);
        backdrop-filter: blur(16px);
        box-shadow: 0 10px 32px rgba(108, 136, 214, 0.08);
      }

      .brand {
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      .topbar-meta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted-strong);
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .meta-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: linear-gradient(180deg, #87a3ff, #5b74ff);
        box-shadow: 0 0 0 7px rgba(109, 134, 255, 0.12);
      }

      .showroom-frame {
        position: relative;
        overflow: hidden;
        padding: 16px;
        border: 1px solid rgba(14, 28, 68, 0.06);
        border-radius: 38px;
        background: rgba(255, 255, 255, 0.42);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .showroom-frame::before,
      .showroom-frame::after {
        content: "";
        position: absolute;
        inset: auto;
        border-radius: 999px;
        filter: blur(18px);
        pointer-events: none;
      }

      .showroom-frame::before {
        top: 44px;
        left: -56px;
        width: 180px;
        height: 180px;
        background: rgba(165, 192, 255, 0.28);
      }

      .showroom-frame::after {
        right: -50px;
        bottom: 38px;
        width: 220px;
        height: 220px;
        background: rgba(149, 171, 255, 0.24);
      }

      .showroom-grid {
        column-width: 220px;
        column-gap: 16px;
      }

      .pet-tile {
        position: relative;
        display: inline-grid;
        width: 100%;
        margin: 0 0 16px;
        padding: 12px;
        border: 1px solid rgba(14, 28, 68, 0.06);
        border-radius: 26px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(242, 246, 255, 0.72));
        backdrop-filter: blur(12px);
        break-inside: avoid;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
        box-shadow: 0 18px 36px rgba(90, 112, 171, 0.08);
      }

      .pet-tile:hover,
      .pet-tile:focus-visible {
        transform: translateY(-3px);
        border-color: rgba(109, 134, 255, 0.26);
        box-shadow: 0 28px 44px rgba(90, 112, 171, 0.14);
        outline: none;
      }

      .pet-tile::after {
        content: "";
        position: absolute;
        inset: 12px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(14, 28, 68, 0.04);
        pointer-events: none;
      }

      .pet-stage {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        min-height: var(--tile-height, 240px);
        border-radius: 20px;
        overflow: hidden;
        background: #fcfdff;
      }

      .pet-stage.compact {
        min-height: 84px;
      }

      .sprite-player {
        position: relative;
        z-index: 1;
        flex: none;
        border-radius: 18px;
        background-repeat: no-repeat;
        background-position: 0 0;
        image-rendering: auto;
        filter: drop-shadow(0 20px 34px rgba(71, 99, 180, 0.18));
      }

      .modal-shell {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 22px;
        background: rgba(235, 241, 255, 0.64);
        backdrop-filter: blur(18px);
      }

      .modal-shell.open {
        display: flex;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
      }

      .modal-panel {
        position: relative;
        z-index: 1;
        width: min(1220px, 100%);
        max-height: min(92vh, 980px);
        overflow: auto;
        padding: 24px;
        border: 1px solid rgba(14, 28, 68, 0.08);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 42px 100px rgba(72, 97, 161, 0.18);
      }

      .modal-close {
        position: sticky;
        top: 0;
        margin-left: auto;
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 1px solid rgba(14, 28, 68, 0.08);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        font-size: 1.1rem;
        cursor: pointer;
      }

      .modal-layout {
        display: grid;
        grid-template-columns: minmax(360px, 1.06fr) minmax(0, 0.94fr);
        gap: 24px;
        align-items: start;
      }

      .modal-preview {
        display: grid;
        gap: 12px;
        padding: 18px;
        border: 1px solid rgba(14, 28, 68, 0.06);
        border-radius: 28px;
        background: rgba(252, 253, 255, 0.94);
      }

      .modal-player-stage {
        display: grid;
        place-items: center;
        min-height: 420px;
        border-radius: 24px;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(14, 28, 68, 0.04);
      }

      .modal-preview-caption {
        color: var(--muted-strong);
        font-size: 0.9rem;
        line-height: 1.55;
        text-align: center;
      }

      .modal-copy {
        display: grid;
        gap: 18px;
      }

      .modal-kicker {
        color: var(--accent);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .modal-title {
        margin: 0;
        font-size: clamp(2.6rem, 5vw, 5rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
        font-weight: 700;
      }

      .modal-id {
        color: var(--muted);
        font-size: 0.92rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .modal-description {
        margin: 0;
        color: var(--muted-strong);
        font-size: 1.05rem;
        line-height: 1.75;
      }

      .command-block {
        display: grid;
        gap: 8px;
        padding: 16px 18px;
        border: 1px solid rgba(109, 134, 255, 0.12);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(243, 246, 255, 0.96), rgba(232, 238, 255, 0.78));
      }

      .command-label {
        color: var(--muted);
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .command-code {
        overflow-x: auto;
        color: #2c45b6;
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
        font-size: 1rem;
        white-space: nowrap;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .meta-card {
        padding: 14px;
        border: 1px solid rgba(14, 28, 68, 0.06);
        border-radius: 18px;
        background: rgba(247, 250, 255, 0.86);
      }

      .meta-card strong {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.74rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .meta-card span {
        color: var(--ink);
        font-size: 0.92rem;
        line-height: 1.55;
        word-break: break-word;
      }

      .state-section {
        display: grid;
        gap: 12px;
      }

      .state-section h2 {
        margin: 0;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .state-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .state-card {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        padding: 10px;
        border: 1px solid rgba(14, 28, 68, 0.06);
        border-radius: 18px;
        background: rgba(248, 250, 255, 0.92);
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .state-card:hover,
      .state-card:focus-visible,
      .state-card.active {
        transform: translateY(-1px);
        border-color: rgba(109, 134, 255, 0.22);
        background: rgba(238, 244, 255, 0.98);
        outline: none;
      }

      .state-name {
        margin: 0;
        font-size: 0.94rem;
        font-weight: 700;
      }

      .state-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .action-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .action-link {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 15px 16px;
        border: 1px solid rgba(14, 28, 68, 0.06);
        border-radius: 18px;
        background: rgba(248, 250, 255, 0.9);
        transition: border-color 160ms ease, background 160ms ease;
      }

      .action-link:hover {
        border-color: rgba(109, 134, 255, 0.22);
        background: rgba(238, 244, 255, 0.98);
      }

      .empty {
        padding: 80px 20px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 1080px) {
        .modal-layout,
        .meta-grid,
        .state-grid,
        .action-row {
          grid-template-columns: 1fr;
        }

        .modal-player-stage {
          min-height: 320px;
        }
      }

      @media (max-width: 720px) {
        .page-shell {
          width: min(calc(100% - 16px), var(--max-width));
          padding-top: 12px;
        }

        .topbar {
          padding: 14px 16px;
          border-radius: 24px;
        }

        .brand,
        .topbar-meta {
          letter-spacing: 0.18em;
        }

        .showroom-frame {
          padding: 10px;
          border-radius: 26px;
        }

        .showroom-grid {
          column-width: 160px;
          column-gap: 10px;
        }

        .pet-tile {
          margin-bottom: 10px;
          padding: 10px;
          border-radius: 18px;
        }

        .pet-tile::after {
          inset: 10px;
          border-radius: 14px;
        }

        .modal-shell {
          padding: 10px;
        }

        .modal-panel {
          padding: 16px;
          border-radius: 24px;
        }

        .modal-title {
          font-size: clamp(2.2rem, 12vw, 3.6rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <div class="brand">Codex Pets</div>
        <div class="topbar-meta">
          <span class="meta-dot"></span>
          <span id="pet-count">Loading showroom</span>
        </div>
      </header>

      <section class="showroom-frame">
        <div id="gallery" class="showroom-grid">
          <div class="empty">Loading animated showroom…</div>
        </div>
      </section>
    </main>

    <div id="modal" class="modal-shell" aria-hidden="true">
      <button id="modal-backdrop" class="modal-backdrop" aria-label="Close details"></button>
      <article class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button id="modal-close" class="modal-close" type="button" aria-label="Close details">
          ×
        </button>
        <div id="modal-content"></div>
      </article>
    </div>

    <script src="./catalog.js"></script>
    <script>
      const galleryEl = document.getElementById("gallery");
      const petCountEl = document.getElementById("pet-count");
      const modalEl = document.getElementById("modal");
      const modalContentEl = document.getElementById("modal-content");
      const modalCloseEl = document.getElementById("modal-close");
      const modalBackdropEl = document.getElementById("modal-backdrop");

      let allPets = [];
      let activeSlug = null;
      let activePreviewKey = null;
      let animationFrameId = null;

      const FALLBACK_ATLAS = {
        columns: 8,
        rows: 9,
        frameWidth: 192,
        frameHeight: 208,
        sheetWidth: 1536,
        sheetHeight: 1872,
      };

      const TILE_HEIGHTS = [204, 236, 278, 228, 302, 246, 214, 286];

      function escapeHtml(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function assetUrl(path) {
        return encodeURI(path);
      }

      function getPetBySlug(slug) {
        return allPets.find((pet) => pet.slug === slug) || null;
      }

      function getPreviewRows(pet) {
        return Array.isArray(pet.previewRows) && pet.previewRows.length ? pet.previewRows : [];
      }

      function getActivePreviewRow(pet) {
        const previewRows = getPreviewRows(pet);
        return (
          previewRows.find((row) => row.key === activePreviewKey) ||
          previewRows.find((row) => row.key === pet.defaultPreviewRow) ||
          previewRows[0] ||
          null
        );
      }

      function getShareUrl(slug) {
        const url = new URL(window.location.href);
        url.searchParams.set("pet", slug);
        url.hash = slug;
        return url.toString();
      }

      function syncUrl(slug) {
        const url = new URL(window.location.href);
        if (slug) {
          url.searchParams.set("pet", slug);
          url.hash = slug;
        } else {
          url.searchParams.delete("pet");
          url.hash = "";
        }
        window.history.replaceState({}, "", url);
      }

      function buildSpriteMarkup({ pet, row, scale, label, staticFrame = false }) {
        const atlas = pet.atlas || FALLBACK_ATLAS;
        return `
          <div
            class="sprite-player"
            role="img"
            aria-label="${escapeHtml(label)}"
            data-sprite-url="${assetUrl(pet.spritesheetFile)}"
            data-row-index="${row.rowIndex}"
            data-frames="${row.frames}"
            data-duration-ms="${row.durationMs}"
            data-scale="${scale}"
            data-frame-width="${atlas.frameWidth}"
            data-frame-height="${atlas.frameHeight}"
            data-sheet-width="${atlas.sheetWidth}"
            data-sheet-height="${atlas.sheetHeight}"
            data-static-frame="${staticFrame ? "true" : "false"}"
          ></div>
        `;
      }

      function hydrateSprites() {
        const sprites = Array.from(document.querySelectorAll(".sprite-player"));
        if (!sprites.length) return;

        function sizeSprite(el) {
          const scale = Number(el.dataset.scale || 1);
          const frameWidth = Number(el.dataset.frameWidth || FALLBACK_ATLAS.frameWidth);
          const frameHeight = Number(el.dataset.frameHeight || FALLBACK_ATLAS.frameHeight);
          const sheetWidth = Number(el.dataset.sheetWidth || FALLBACK_ATLAS.sheetWidth);
          const sheetHeight = Number(el.dataset.sheetHeight || FALLBACK_ATLAS.sheetHeight);
          const spriteUrl = el.dataset.spriteUrl || "";
          el.style.width = `${frameWidth * scale}px`;
          el.style.height = `${frameHeight * scale}px`;
          el.style.backgroundImage = `url("${spriteUrl}")`;
          el.style.backgroundSize = `${sheetWidth * scale}px ${sheetHeight * scale}px`;
        }

        function paintSprite(el, frameIndex) {
          const scale = Number(el.dataset.scale || 1);
          const frameWidth = Number(el.dataset.frameWidth || FALLBACK_ATLAS.frameWidth);
          const frameHeight = Number(el.dataset.frameHeight || FALLBACK_ATLAS.frameHeight);
          const rowIndex = Number(el.dataset.rowIndex || 0);
          el.style.backgroundPosition = `${frameIndex * frameWidth * scale * -1}px ${rowIndex * frameHeight * scale * -1}px`;
        }

        sprites.forEach((el) => {
          sizeSprite(el);
          paintSprite(el, 0);
        });

        if (animationFrameId) {
          window.cancelAnimationFrame(animationFrameId);
        }

        const startTime = performance.now();
        const tick = (now) => {
          sprites.forEach((el) => {
            if (el.dataset.staticFrame === "true") {
              paintSprite(el, 0);
              return;
            }

            const frames = Math.max(1, Number(el.dataset.frames || 1));
            const durationMs = Math.max(1, Number(el.dataset.durationMs || 1000));
            const elapsed = (now - startTime) % durationMs;
            const frameIndex = Math.min(frames - 1, Math.floor((elapsed / durationMs) * frames));
            paintSprite(el, frameIndex);
          });

          animationFrameId = window.requestAnimationFrame(tick);
        };

        animationFrameId = window.requestAnimationFrame(tick);
      }

      function closeModal() {
        activeSlug = null;
        activePreviewKey = null;
        modalEl.classList.remove("open");
        modalEl.setAttribute("aria-hidden", "true");
        document.body.classList.remove("modal-open");
        syncUrl(null);
      }

      function renderModal(pet) {
        if (!pet) {
          modalContentEl.innerHTML = "";
          closeModal();
          return;
        }

        const activeRow = getActivePreviewRow(pet);
        const previewRows = getPreviewRows(pet);
        const shareUrl = getShareUrl(pet.slug);
        const installCommand = `npx petdex install ${pet.slug}`;
        const stateButtons = previewRows
          .map(
            (row) => `
              <button
                type="button"
                class="state-card${row.key === activeRow?.key ? " active" : ""}"
                data-preview-key="${row.key}"
                aria-label="Preview ${escapeHtml(pet.displayName)} ${escapeHtml(row.label)}"
              >
                <div class="pet-stage compact">
                  ${buildSpriteMarkup({
                    pet,
                    row,
                    scale: 0.26,
                    label: `${pet.displayName} ${row.label}`,
                    staticFrame: true,
                  })}
                </div>
                <div>
                  <p class="state-name">${escapeHtml(row.label)}</p>
                  <div class="state-meta">Row ${row.rowIndex} · ${row.frames} frames</div>
                </div>
              </button>
            `
          )
          .join("");

        modalContentEl.innerHTML = `
          <div class="modal-layout">
            <section class="modal-preview">
              <div class="modal-player-stage">
                ${buildSpriteMarkup({
                  pet,
                  row: activeRow,
                  scale: 1.08,
                  label: `${pet.displayName} ${activeRow.label} animation`,
                })}
              </div>
              <div class="modal-preview-caption">
                <strong>${escapeHtml(activeRow.label)}</strong> · ${activeRow.frames} frames · Row
                ${activeRow.rowIndex}
                <br />
                ${escapeHtml(activeRow.notes || "Expanded atlas preview from the packaged spritesheet.")}
              </div>
            </section>

            <section class="modal-copy">
              <div>
                <div class="modal-kicker">Codex Pet Window</div>
                <h1 id="modal-title" class="modal-title">${escapeHtml(pet.displayName)}</h1>
                <div class="modal-id">${escapeHtml(pet.id)}</div>
              </div>

              <p class="modal-description">
                ${escapeHtml(pet.description || "No description available for this pet yet.")}
              </p>

              <div class="command-block">
                <div class="command-label">Install method</div>
                <div class="command-code">${escapeHtml(installCommand)}</div>
              </div>

              <div class="meta-grid">
                <div class="meta-card">
                  <strong>Slug</strong>
                  <span>${escapeHtml(pet.slug)}</span>
                </div>
                <div class="meta-card">
                  <strong>Named states</strong>
                  <span>${pet.stateCount}</span>
                </div>
                <div class="meta-card">
                  <strong>Direct link</strong>
                  <span>${escapeHtml(shareUrl)}</span>
                </div>
              </div>

              <section class="state-section">
                <h2>Detailed preview</h2>
                <div class="state-grid">${stateButtons}</div>
              </section>

              <div class="action-row">
                <a class="action-link" href="${shareUrl}">
                  <span>Open direct link</span>
                  <span>↗</span>
                </a>
                <a
                  class="action-link"
                  href="${assetUrl(pet.petJsonPath)}"
                  target="_blank"
                  rel="noreferrer"
                >
                  <span>Open pet.json</span>
                  <span>↗</span>
                </a>
                <a
                  class="action-link"
                  href="${assetUrl(pet.spritesheetFile)}"
                  target="_blank"
                  rel="noreferrer"
                >
                  <span>Open spritesheet</span>
                  <span>↗</span>
                </a>
              </div>
            </section>
          </div>
        `;

        modalContentEl.querySelectorAll("[data-preview-key]").forEach((button) => {
          button.addEventListener("click", () => {
            activePreviewKey = button.dataset.previewKey;
            renderModal(pet);
          });
        });

        modalEl.classList.add("open");
        modalEl.setAttribute("aria-hidden", "false");
        document.body.classList.add("modal-open");
        hydrateSprites();
      }

      function openPet(slug) {
        const pet = getPetBySlug(slug);
        if (!pet) return;
        activeSlug = pet.slug;
        activePreviewKey = pet.defaultPreviewRow || getPreviewRows(pet)[0]?.key || null;
        syncUrl(activeSlug);
        renderModal(pet);
      }

      function renderGallery() {
        if (!allPets.length) {
          galleryEl.innerHTML = `<div class="empty">No pets available yet.</div>`;
          return;
        }

        galleryEl.innerHTML = allPets
          .map((pet, index) => {
            const row =
              getPreviewRows(pet)[0] || {
                key: "idle",
                label: "Idle",
                rowIndex: 0,
                frames: 6,
                durationMs: 1100,
              };
            const tileHeight = TILE_HEIGHTS[index % TILE_HEIGHTS.length];

            return `
              <button
                type="button"
                class="pet-tile"
                data-slug="${pet.slug}"
                aria-label="Open ${escapeHtml(pet.displayName)} details"
                style="--tile-height:${tileHeight}px"
              >
                <div class="pet-stage">
                  ${buildSpriteMarkup({
                    pet,
                    row,
                    scale: 0.56,
                    label: `${pet.displayName} animated preview`,
                  })}
                </div>
              </button>
            `;
          })
          .join("");

        galleryEl.querySelectorAll("[data-slug]").forEach((button) => {
          button.addEventListener("click", () => {
            openPet(button.dataset.slug);
          });
        });

        hydrateSprites();
      }

      async function boot() {
        try {
          const catalog =
            typeof window.__CODEX_PETS__ === "object" && window.__CODEX_PETS__
              ? window.__CODEX_PETS__
              : await (async () => {
                  const response = await fetch("./index.json");
                  if (!response.ok) {
                    throw new Error(`Failed to load index.json (${response.status})`);
                  }
                  return response.json();
                })();

          allPets = (catalog.pets || []).sort((a, b) => a.displayName.localeCompare(b.displayName));
          petCountEl.textContent = `${allPets.length} live previews`;
          renderGallery();

          const requestedSlug =
            new URL(window.location.href).searchParams.get("pet") ||
            window.location.hash.replace(/^#/, "");

          if (requestedSlug && getPetBySlug(requestedSlug)) {
            openPet(requestedSlug);
          }
        } catch (error) {
          console.error(error);
          galleryEl.innerHTML = `
            <div class="empty">
              Could not load the generated catalog. Run
              <code>python3 scripts/build_index.py</code> and refresh the page.
            </div>
          `;
          petCountEl.textContent = "Preview unavailable";
        }
      }

      modalCloseEl.addEventListener("click", closeModal);
      modalBackdropEl.addEventListener("click", closeModal);

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modalEl.classList.contains("open")) {
          closeModal();
        }
      });

      window.addEventListener("hashchange", () => {
        const slug = window.location.hash.replace(/^#/, "");
        if (!slug) {
          closeModal();
          return;
        }
        if (getPetBySlug(slug)) {
          openPet(slug);
        }
      });

      boot();
    </script>
  </body>
</html>
