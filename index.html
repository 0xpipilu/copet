    <style>
      :root {
        --bg: #fff;
        --card: #f6f6f6;
        --border: rgba(0, 0, 0, 0.1);
        --ink: #0a0a0a;
        --secondary: rgba(0, 0, 0, 0.4);
        --r: 10px;
        --max-w: 1200px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      button, input { font: inherit; }
      button { border: 0; background: transparent; color: inherit; cursor: pointer; }

      .shell {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 0 24px;
      }

      /* — Header — */
      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 48px;
      }

      .logo {
        display: flex;
        align-items: center;
        color: var(--ink);
        transition: color 150ms ease, filter 150ms ease;
      }

      .logo:hover {
        color: #56f264;
        filter: drop-shadow(0 0 6px rgba(86, 242, 100, 0.5));
      }

      .logo svg {
        height: 18px;
        width: auto;
        display: block;
        transition: transform 150ms ease;
      }

      .logo:hover svg {
        transform: scale(1.03);
      }

      /* — Social Links — */
      .social-links {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .social-link {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--secondary);
        transition: color 150ms ease, filter 150ms ease, transform 150ms ease;
      }

      .social-link:hover {
        color: var(--ink);
        transform: scale(1.05);
      }

      .social-link svg {
        height: 18px;
        width: auto;
        display: block;
      }

      .social-link:hover svg {
        filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.1));
      }

      /* — Gallery — */
      .gallery {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        border-left: 1px solid var(--border);
      }

      .tile {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 20px 8px 14px;
        background: var(--bg);
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        cursor: default;
        transition: background 120ms;
      }

      .tile:hover { background: var(--card); }

      .tile-stage {
        display: grid;
        place-items: center;
        width: 100%;
        aspect-ratio: 1;
      }

      /* Label area: name or download button */
      .tile-label {
        width: 100%;
        min-height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tile-name {
        font-size: 11px;
        font-weight: 500;
        color: var(--secondary);
        text-align: center;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }

      .tile-dl {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 4px;
        height: 24px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        font-size: 10px;
        font-weight: 500;
        color: var(--secondary);
        cursor: pointer;
        transition: border-color 80ms, color 80ms;
        white-space: nowrap;
      }

      .tile-dl:hover {
        border-color: var(--ink);
        color: var(--ink);
      }

      .tile-dl svg {
        width: 11px;
        height: 11px;
        flex: none;
      }

      .tile-dl.busy {
        pointer-events: none;
        opacity: 0.5;
      }

      .tile:hover .tile-name { display: none; }
      .tile:hover .tile-dl   { display: inline-flex; }

      /* — Sprite — */
      .sprite-player {
        flex: none;
        background-repeat: no-repeat;
        background-position: 0 0;
        image-rendering: auto;
      }

      .empty {
        grid-column: 1 / -1;
        padding: 60px 20px;
        text-align: center;
        color: var(--secondary);
        font-size: 13px;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }

      /* — Footer — */
      .footer {
        padding: 20px 0;
        text-align: center;
        font-size: 11px;
        color: var(--secondary);
      }

      /* — Responsive — */
      @media (max-width: 900px) {
        .shell { padding: 0 16px; }
        .gallery { grid-template-columns: repeat(4, 1fr); }
      }

      @media (max-width: 600px) {
        .gallery { grid-template-columns: repeat(3, 1fr); }
      }

      @media (max-width: 400px) {
        .gallery { grid-template-columns: repeat(2, 1fr); }
      }
    </style>

      const galleryEl = document.getElementById("gallery");

      const FA = { frameWidth: 192, frameHeight: 208, sheetWidth: 1536, sheetHeight: 1872 };

      function esc(t) { return String(t ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
      function getPet(s) { return allPets.find(p => p.slug === s) || null; }
      function getRows(p) { return Array.isArray(p.previewRows) && p.previewRows.length ? p.previewRows : []; }

      const DL_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

      function getMockDownloadCount(slug) {
        let hash = 0;
        for (let i = 0; i < slug.length; i++) {
          hash = slug.charCodeAt(i) + ((hash << 5) - hash);
        }
        const base = 120 + Math.abs(hash % 1760);
        const extra = parseInt(localStorage.getItem(`dl_${slug}`) || "0", 10);
        const count = base + extra;
        if (count >= 1000) {
          return (count / 1000).toFixed(1) + "k";
        }
        return count;
      }

      /* ---- Sprite engine ---- */
      function loadSprite(el) {
        const a = el._atlas;
        el.style.width  = a.fw * a.s + "px";
        el.style.height = a.fh * a.s + "px";
        el.style.backgroundImage = `url("${encodeURI(a.src)}")`;
        el.style.backgroundSize  = a.sw * a.s + "px " + a.sh * a.s + "px";
        el._loaded = true;
      }

      function showFrame(el, rowIndex, frameIndex) {
        const a = el._atlas;
        el.style.backgroundPosition =
          (-frameIndex * a.fw * a.s) + "px " + (-rowIndex * a.fh * a.s) + "px";
      }

      /* Lazy load: set dimensions immediately, load image when near viewport */
      const lazyObs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (!e.isIntersecting) return;
          loadSprite(e.target);
          showFrame(e.target, e.target._atlas.defaultRow, 0);
          lazyObs.unobserve(e.target);
        });
      }, { rootMargin: "400px" });

      /* ---- Hover: accelerated all-state cycling ---- */
      function startHover(tile) {
        const el = tile._sprite;
        const pet = getPet(tile.dataset.slug);
        if (!el || !pet) return;

        /* Make sure image is loaded */
        if (!el._loaded) {
          loadSprite(el);
          showFrame(el, el._atlas.defaultRow, 0);
        }

        const rows = getRows(pet);
        if (!rows.length) return;

        const msPerRow = 350;
        const totalDur = msPerRow * rows.length;
        let t0 = null;

        function tick(now) {
          if (t0 === null) t0 = now;
          const elapsed = Math.max(0, now - t0) % totalDur;
          const idx = Math.floor(elapsed / msPerRow) % rows.length;
          const row = rows[idx];
          if (!row) {
            tile._anim = requestAnimationFrame(tick);
            return;
          }
          const frames = Math.max(1, row.frames);
          const rowProgress = (elapsed % msPerRow) / msPerRow;
          const fi = Math.min(frames - 1, Math.floor(rowProgress * frames));
          showFrame(el, row.rowIndex, fi);
          tile._anim = requestAnimationFrame(tick);
        }
        tile._anim = requestAnimationFrame(tick);
      }

      function stopHover(tile) {
        if (tile._anim) { cancelAnimationFrame(tile._anim); tile._anim = null; }
        const el = tile._sprite;
        if (el && el._loaded) {
          showFrame(el, el._atlas.defaultRow, 0);
        }
      }

      /* ---- Download: zip pet.json + spritesheet.webp ---- */
      async function downloadPet(pet, btn) {
        btn.classList.add("busy");
        btn.textContent = "…";

        try {
          const [jsonResp, imgResp] = await Promise.all([
            fetch(pet.petJsonPath),
            fetch(pet.spritesheetFile),
          ]);

          const [jsonBlob, imgBlob] = await Promise.all([
            jsonResp.blob(),
            imgResp.blob(),
          ]);

          const ext = pet.spritesheetFile.split(".").pop() || "webp";
          const zip = new JSZip();
          zip.file("pet.json", jsonBlob);
          zip.file("spritesheet." + ext, imgBlob);

          const readmeCN = `==================================================

          const readmeEN = `==================================================

          zip.file("安装说明.txt", readmeCN);

      /* ---- Render ---- */
      function renderGallery() {
        if (!allPets.length) {
          galleryEl.innerHTML = `<div class="empty">No pets available.</div>`;
          return;
        }

        galleryEl.innerHTML = allPets.map(pet => {
          const row = getRows(pet)[0] || { rowIndex: 0, frames: 6, durationMs: 1100 };
          return `
            <div class="tile" data-slug="${pet.slug}">
              <div class="tile-stage">
                <div class="sprite-player" data-pet-slug="${pet.slug}"></div>
              </div>
              <div class="tile-label">
                <div class="tile-name">${esc(pet.displayName)}</div>
                <button type="button" class="tile-dl" data-slug="${pet.slug}">
                  ${DL_ICON} Download (${getMockDownloadCount(pet.slug)})
                </button>
              </div>
            </div>`;
        }).join("");

        /* Init sprite elements with atlas data */
        galleryEl.querySelectorAll(".tile").forEach(tile => {
          const pet = getPet(tile.dataset.slug);
          if (!pet) return;
          const a = pet.atlas || FA;
          const row0 = getRows(pet)[0] || { rowIndex: 0 };
          const el = tile.querySelector(".sprite-player");

          /* Store atlas info directly on the element */
          el._atlas = {
            src: pet.spritesheetFile,
            fw: a.frameWidth, fh: a.frameHeight,
            sw: a.sheetWidth, sh: a.sheetHeight,
            s: 0.38,
            defaultRow: row0.rowIndex,
          };
          el._loaded = false;

          /* Set dimensions immediately to reserve layout space */
          el.style.width  = a.frameWidth * 0.38 + "px";
          el.style.height = a.frameHeight * 0.38 + "px";

          /* Cache sprite ref on tile */
          tile._sprite = el;

          /* Observe for lazy loading */
          lazyObs.observe(el);

          /* Hover handlers */
          tile.addEventListener("mouseenter", () => startHover(tile));
          tile.addEventListener("mouseleave", () => stopHover(tile));
        });

        /* Download handlers */
        galleryEl.querySelectorAll(".tile-dl").forEach(btn => {
          btn.addEventListener("click", e => {
            e.stopPropagation();
            const pet = getPet(btn.dataset.slug);
            if (pet) downloadPet(pet, btn);
          });
        });
      }

      /* ---- Boot ---- */
      (async function boot() {
        try {
          const catalog = typeof window.__CODEX_PETS__ === "object" && window.__CODEX_PETS__
            ? window.__CODEX_PETS__
            : await fetch("./index.json?v=20260601").then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });

          allPets = catalog.pets || [];
          renderGallery();
        } catch (e) {
          console.error(e);
          galleryEl.innerHTML = `<div class="empty">Could not load catalog.</div>`;
        }
      })();
    </script>
  </body>
</html>
