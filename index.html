<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Pets</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f7f5f2;
        --surface-strong: #fbfaf8;
        --border: rgba(17, 17, 17, 0.08);
        --border-strong: rgba(17, 17, 17, 0.14);
        --ink: #0f0f10;
        --muted: rgba(15, 15, 16, 0.54);
        --muted-strong: rgba(15, 15, 16, 0.72);
        --radius-xl: 32px;
        --radius-lg: 24px;
        --radius-md: 18px;
        --max-width: 1480px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      }

      body.modal-open {
        overflow: hidden;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        border: 0;
        background: transparent;
        color: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page-shell {
        width: min(calc(100% - 32px), var(--max-width));
        margin: 0 auto;
        padding: 18px 0 52px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 56px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: -0.08em;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .pill-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 20px;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font-size: 0.98rem;
        font-weight: 500;
        white-space: nowrap;
      }

      .pill-button.dark {
        border-color: #111;
        background: #111;
        color: #fff;
      }

      .hero {
        display: grid;
        justify-items: center;
        gap: 18px;
        margin-bottom: 42px;
        text-align: center;
      }

      .hero-title {
        margin: 0;
        font-size: clamp(3.6rem, 8vw, 6.3rem);
        line-height: 0.95;
        letter-spacing: -0.08em;
        font-weight: 500;
      }

      .hero-copy {
        max-width: 680px;
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .hero-switch {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
      }

      .hero-switch span {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 120px;
        min-height: 42px;
        padding: 0 18px;
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .hero-switch .active {
        background: #111;
        color: #fff;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 18px;
      }

      .pet-tile {
        display: grid;
        place-items: center;
        min-height: 246px;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--surface);
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .pet-tile:hover,
      .pet-tile:focus-visible {
        transform: translateY(-2px);
        border-color: var(--border-strong);
        background: var(--surface-strong);
        outline: none;
      }

      .pet-stage {
        display: grid;
        place-items: center;
        width: 100%;
        min-height: 188px;
        border-radius: 22px;
        background: #fff;
      }

      .pet-stage.compact {
        min-height: 88px;
      }

      .sprite-player {
        flex: none;
        background-repeat: no-repeat;
        background-position: 0 0;
        image-rendering: auto;
      }

      .empty {
        padding: 72px 20px;
        color: var(--muted);
        text-align: center;
      }

      .modal-shell {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(6px);
      }

      .modal-shell.open {
        display: flex;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
      }

      .modal-panel {
        position: relative;
        z-index: 1;
        width: min(1220px, 100%);
        max-height: min(92vh, 980px);
        overflow: auto;
        padding: 18px 18px 24px;
        border: 1px solid var(--border);
        border-radius: 34px;
        background: #fff;
      }

      .modal-close {
        position: sticky;
        top: 0;
        margin-left: auto;
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        font-size: 1.1rem;
        cursor: pointer;
      }

      .modal-layout {
        display: grid;
        grid-template-columns: minmax(360px, 1fr) minmax(0, 0.92fr);
        gap: 26px;
        align-items: start;
      }

      .modal-preview {
        display: grid;
        gap: 14px;
      }

      .modal-player-stage {
        display: grid;
        place-items: center;
        min-height: 470px;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--surface);
      }

      .state-pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .state-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--muted-strong);
        cursor: pointer;
        transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
      }

      .state-pill:hover,
      .state-pill:focus-visible,
      .state-pill.active {
        border-color: #111;
        background: #111;
        color: #fff;
        outline: none;
      }

      .state-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
      }

      .state-thumb {
        display: grid;
        gap: 8px;
        justify-items: center;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        cursor: pointer;
        transition: border-color 160ms ease, background 160ms ease;
      }

      .state-thumb:hover,
      .state-thumb:focus-visible,
      .state-thumb.active {
        border-color: var(--border-strong);
        background: var(--surface-strong);
        outline: none;
      }

      .state-thumb-label {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .modal-copy {
        display: grid;
        gap: 18px;
        padding: 8px 6px;
      }

      .modal-kicker {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .modal-title {
        margin: 0;
        font-size: clamp(3rem, 6vw, 5.6rem);
        line-height: 0.92;
        letter-spacing: -0.08em;
        font-weight: 500;
      }

      .modal-id {
        color: var(--muted);
        font-size: 0.96rem;
      }

      .modal-description {
        margin: 0;
        color: var(--muted-strong);
        font-size: 1.06rem;
        line-height: 1.7;
      }

      .command-block,
      .meta-card {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
      }

      .command-label,
      .meta-card strong,
      .state-section-title {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .command-code {
        overflow-x: auto;
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
        font-size: 1rem;
        white-space: nowrap;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .meta-card span {
        color: var(--muted-strong);
        line-height: 1.55;
        word-break: break-word;
      }

      .action-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .action-link {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 54px;
        padding: 0 18px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
      }

      .action-link.dark {
        border-color: #111;
        background: #111;
        color: #fff;
      }

      @media (max-width: 1100px) {
        .modal-layout,
        .meta-grid,
        .action-row {
          grid-template-columns: 1fr;
        }

        .modal-player-stage {
          min-height: 340px;
        }
      }

      @media (max-width: 720px) {
        .page-shell {
          width: min(calc(100% - 20px), var(--max-width));
        }

        .topbar {
          margin-bottom: 34px;
        }

        .brand {
          letter-spacing: 0.16em;
        }

        .hero {
          margin-bottom: 28px;
        }

        .hero-title {
          font-size: clamp(3rem, 14vw, 4.5rem);
        }

        .hero-copy {
          font-size: 0.98rem;
        }

        .hero-switch {
          width: 100%;
          justify-content: center;
        }

        .hero-switch span {
          min-width: 0;
          flex: 1;
        }

        .gallery-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 12px;
        }

        .pet-tile {
          min-height: 196px;
          padding: 12px;
          border-radius: 22px;
        }

        .pet-stage {
          min-height: 144px;
          border-radius: 18px;
        }

        .topbar-actions {
          gap: 8px;
        }

        .pill-button {
          min-height: 42px;
          padding: 0 16px;
          font-size: 0.92rem;
        }

        .modal-shell {
          padding: 10px;
        }

        .modal-panel {
          padding: 14px 14px 20px;
          border-radius: 26px;
        }

        .modal-title {
          font-size: clamp(2.4rem, 13vw, 4rem);
        }

        .state-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">XI</span>
          <span>Codex Pets</span>
        </div>
        <div class="topbar-actions">
          <div id="pet-count-button" class="pill-button">Loading</div>
          <button id="random-open" class="pill-button dark" type="button">Open random</button>
        </div>
      </header>

      <section class="hero">
        <h1 class="hero-title">Showroom</h1>
        <p class="hero-copy">
          Open any pet to view its full animation rows, package details, and install method.
        </p>
        <div class="hero-switch" aria-hidden="true">
          <span class="active">All pets</span>
          <span id="pet-count">Loading collection</span>
        </div>
      </section>

      <section id="gallery" class="gallery-grid">
        <div class="empty">Loading animated showroom…</div>
      </section>
    </main>

    <div id="modal" class="modal-shell" aria-hidden="true">
      <button id="modal-backdrop" class="modal-backdrop" aria-label="Close details"></button>
      <article class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button id="modal-close" class="modal-close" type="button" aria-label="Close details">
          ×
        </button>
        <div id="modal-content"></div>
      </article>
    </div>

    <script src="./catalog.js"></script>
    <script>
      const galleryEl = document.getElementById("gallery");
      const petCountEl = document.getElementById("pet-count");
      const petCountButtonEl = document.getElementById("pet-count-button");
      const randomOpenEl = document.getElementById("random-open");
      const modalEl = document.getElementById("modal");
      const modalContentEl = document.getElementById("modal-content");
      const modalCloseEl = document.getElementById("modal-close");
      const modalBackdropEl = document.getElementById("modal-backdrop");

      let allPets = [];
      let activeSlug = null;
      let activePreviewKey = null;
      let animationFrameId = null;

      const FALLBACK_ATLAS = {
        columns: 8,
        rows: 9,
        frameWidth: 192,
        frameHeight: 208,
        sheetWidth: 1536,
        sheetHeight: 1872,
      };

      function escapeHtml(text) {
        return String(text ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function assetUrl(path) {
        return encodeURI(path);
      }

      function getPetBySlug(slug) {
        return allPets.find((pet) => pet.slug === slug) || null;
      }

      function getPreviewRows(pet) {
        return Array.isArray(pet.previewRows) && pet.previewRows.length ? pet.previewRows : [];
      }

      function getActivePreviewRow(pet) {
        const previewRows = getPreviewRows(pet);
        return (
          previewRows.find((row) => row.key === activePreviewKey) ||
          previewRows.find((row) => row.key === pet.defaultPreviewRow) ||
          previewRows[0] ||
          null
        );
      }

      function getShareUrl(slug) {
        const url = new URL(window.location.href);
        url.searchParams.set("pet", slug);
        url.hash = slug;
        return url.toString();
      }

      function syncUrl(slug) {
        const url = new URL(window.location.href);
        if (slug) {
          url.searchParams.set("pet", slug);
          url.hash = slug;
        } else {
          url.searchParams.delete("pet");
          url.hash = "";
        }
        window.history.replaceState({}, "", url);
      }

      function buildSpriteMarkup({ pet, row, scale, label, staticFrame = false }) {
        const atlas = pet.atlas || FALLBACK_ATLAS;
        return `
          <div
            class="sprite-player"
            role="img"
            aria-label="${escapeHtml(label)}"
            data-sprite-url="${assetUrl(pet.spritesheetFile)}"
            data-row-index="${row.rowIndex}"
            data-frames="${row.frames}"
            data-duration-ms="${row.durationMs}"
            data-scale="${scale}"
            data-frame-width="${atlas.frameWidth}"
            data-frame-height="${atlas.frameHeight}"
            data-sheet-width="${atlas.sheetWidth}"
            data-sheet-height="${atlas.sheetHeight}"
            data-static-frame="${staticFrame ? "true" : "false"}"
          ></div>
        `;
      }

      function hydrateSprites() {
        const sprites = Array.from(document.querySelectorAll(".sprite-player"));
        if (!sprites.length) return;

        function sizeSprite(el) {
          const scale = Number(el.dataset.scale || 1);
          const frameWidth = Number(el.dataset.frameWidth || FALLBACK_ATLAS.frameWidth);
          const frameHeight = Number(el.dataset.frameHeight || FALLBACK_ATLAS.frameHeight);
          const sheetWidth = Number(el.dataset.sheetWidth || FALLBACK_ATLAS.sheetWidth);
          const sheetHeight = Number(el.dataset.sheetHeight || FALLBACK_ATLAS.sheetHeight);
          const spriteUrl = el.dataset.spriteUrl || "";
          el.style.width = `${frameWidth * scale}px`;
          el.style.height = `${frameHeight * scale}px`;
          el.style.backgroundImage = `url("${spriteUrl}")`;
          el.style.backgroundSize = `${sheetWidth * scale}px ${sheetHeight * scale}px`;
        }

        function paintSprite(el, frameIndex) {
          const scale = Number(el.dataset.scale || 1);
          const frameWidth = Number(el.dataset.frameWidth || FALLBACK_ATLAS.frameWidth);
          const frameHeight = Number(el.dataset.frameHeight || FALLBACK_ATLAS.frameHeight);
          const rowIndex = Number(el.dataset.rowIndex || 0);
          el.style.backgroundPosition = `${frameIndex * frameWidth * scale * -1}px ${rowIndex * frameHeight * scale * -1}px`;
        }

        sprites.forEach((el) => {
          sizeSprite(el);
          paintSprite(el, 0);
        });

        if (animationFrameId) {
          window.cancelAnimationFrame(animationFrameId);
        }

        const startTime = performance.now();
        const tick = (now) => {
          sprites.forEach((el) => {
            if (el.dataset.staticFrame === "true") {
              paintSprite(el, 0);
              return;
            }
            const frames = Math.max(1, Number(el.dataset.frames || 1));
            const durationMs = Math.max(1, Number(el.dataset.durationMs || 1000));
            const elapsed = (now - startTime) % durationMs;
            const frameIndex = Math.min(frames - 1, Math.floor((elapsed / durationMs) * frames));
            paintSprite(el, frameIndex);
          });
          animationFrameId = window.requestAnimationFrame(tick);
        };

        animationFrameId = window.requestAnimationFrame(tick);
      }

      function closeModal() {
        activeSlug = null;
        activePreviewKey = null;
        modalEl.classList.remove("open");
        modalEl.setAttribute("aria-hidden", "true");
        document.body.classList.remove("modal-open");
        syncUrl(null);
      }

      function renderModal(pet) {
        if (!pet) {
          modalContentEl.innerHTML = "";
          closeModal();
          return;
        }

        const activeRow = getActivePreviewRow(pet);
        const previewRows = getPreviewRows(pet);
        const shareUrl = getShareUrl(pet.slug);
        const installCommand = `npx petdex install ${pet.slug}`;

        const statePills = previewRows
          .map(
            (row) => `
              <button
                type="button"
                class="state-pill${row.key === activeRow?.key ? " active" : ""}"
                data-preview-key="${row.key}"
              >
                ${escapeHtml(row.label)}
              </button>
            `
          )
          .join("");

        const stateThumbs = previewRows
          .map(
            (row) => `
              <button
                type="button"
                class="state-thumb${row.key === activeRow?.key ? " active" : ""}"
                data-preview-key="${row.key}"
                aria-label="Preview ${escapeHtml(row.label)}"
              >
                <div class="pet-stage compact">
                  ${buildSpriteMarkup({
                    pet,
                    row,
                    scale: 0.24,
                    label: `${pet.displayName} ${row.label}`,
                    staticFrame: true,
                  })}
                </div>
                <div class="state-thumb-label">${escapeHtml(row.label)}</div>
              </button>
            `
          )
          .join("");

        modalContentEl.innerHTML = `
          <div class="modal-layout">
            <section class="modal-preview">
              <div class="modal-player-stage">
                ${buildSpriteMarkup({
                  pet,
                  row: activeRow,
                  scale: 1.04,
                  label: `${pet.displayName} ${activeRow.label} animation`,
                })}
              </div>
              <div class="state-pill-row">${statePills}</div>
              <div class="state-strip">${stateThumbs}</div>
            </section>

            <section class="modal-copy">
              <div>
                <div class="modal-kicker">Pet details</div>
                <h1 id="modal-title" class="modal-title">${escapeHtml(pet.displayName)}</h1>
                <div class="modal-id">${escapeHtml(pet.id)}</div>
              </div>

              <p class="modal-description">
                ${escapeHtml(pet.description || "No description available for this pet yet.")}
              </p>

              <div class="command-block">
                <span class="command-label">Install method</span>
                <div class="command-code">${escapeHtml(installCommand)}</div>
              </div>

              <div class="meta-grid">
                <div class="meta-card">
                  <strong>Slug</strong>
                  <span>${escapeHtml(pet.slug)}</span>
                </div>
                <div class="meta-card">
                  <strong>States</strong>
                  <span>${pet.stateCount} named states</span>
                </div>
                <div class="meta-card">
                  <strong>Preview row</strong>
                  <span>${escapeHtml(activeRow.label)} · ${activeRow.frames} frames</span>
                </div>
              </div>

              <div class="command-block">
                <span class="command-label">Direct link</span>
                <div class="command-code">${escapeHtml(shareUrl)}</div>
              </div>

              <div class="action-row">
                <a class="action-link" href="${assetUrl(pet.petJsonPath)}" target="_blank" rel="noreferrer">
                  <span>Open JSON</span>
                  <span>↗</span>
                </a>
                <a class="action-link" href="${assetUrl(pet.spritesheetFile)}" target="_blank" rel="noreferrer">
                  <span>Open spritesheet</span>
                  <span>↗</span>
                </a>
                <a class="action-link dark" href="${shareUrl}">
                  <span>Open direct link</span>
                  <span>↗</span>
                </a>
              </div>
            </section>
          </div>
        `;

        modalContentEl.querySelectorAll("[data-preview-key]").forEach((button) => {
          button.addEventListener("click", () => {
            activePreviewKey = button.dataset.previewKey;
            renderModal(pet);
          });
        });

        modalEl.classList.add("open");
        modalEl.setAttribute("aria-hidden", "false");
        document.body.classList.add("modal-open");
        hydrateSprites();
      }

      function openPet(slug) {
        const pet = getPetBySlug(slug);
        if (!pet) return;
        activeSlug = pet.slug;
        activePreviewKey = pet.defaultPreviewRow || getPreviewRows(pet)[0]?.key || null;
        syncUrl(activeSlug);
        renderModal(pet);
      }

      function openRandomPet() {
        if (!allPets.length) return;
        const pet = allPets[Math.floor(Math.random() * allPets.length)];
        openPet(pet.slug);
      }

      function renderGallery() {
        if (!allPets.length) {
          galleryEl.innerHTML = `<div class="empty">No pets available yet.</div>`;
          return;
        }

        galleryEl.innerHTML = allPets
          .map((pet) => {
            const row =
              getPreviewRows(pet)[0] || {
                key: "idle",
                label: "Idle",
                rowIndex: 0,
                frames: 6,
                durationMs: 1100,
              };
            return `
              <button
                type="button"
                class="pet-tile"
                data-slug="${pet.slug}"
                aria-label="Open ${escapeHtml(pet.displayName)}"
              >
                <div class="pet-stage">
                  ${buildSpriteMarkup({
                    pet,
                    row,
                    scale: 0.48,
                    label: `${pet.displayName} animated preview`,
                  })}
                </div>
              </button>
            `;
          })
          .join("");

        galleryEl.querySelectorAll("[data-slug]").forEach((button) => {
          button.addEventListener("click", () => {
            openPet(button.dataset.slug);
          });
        });

        hydrateSprites();
      }

      async function boot() {
        try {
          const catalog =
            typeof window.__CODEX_PETS__ === "object" && window.__CODEX_PETS__
              ? window.__CODEX_PETS__
              : await (async () => {
                  const response = await fetch("./index.json");
                  if (!response.ok) {
                    throw new Error(`Failed to load index.json (${response.status})`);
                  }
                  return response.json();
                })();

          allPets = (catalog.pets || []).sort((a, b) => a.displayName.localeCompare(b.displayName));
          petCountEl.textContent = `${allPets.length} live previews`;
          petCountButtonEl.textContent = `${allPets.length} pets`;
          renderGallery();

          const requestedSlug =
            new URL(window.location.href).searchParams.get("pet") ||
            window.location.hash.replace(/^#/, "");

          if (requestedSlug && getPetBySlug(requestedSlug)) {
            openPet(requestedSlug);
          }
        } catch (error) {
          console.error(error);
          galleryEl.innerHTML = `
            <div class="empty">
              Could not load the generated catalog. Run
              <code>python3 scripts/build_index.py</code> and refresh the page.
            </div>
          `;
          petCountEl.textContent = "Preview unavailable";
          petCountButtonEl.textContent = "Unavailable";
        }
      }

      randomOpenEl.addEventListener("click", openRandomPet);
      modalCloseEl.addEventListener("click", closeModal);
      modalBackdropEl.addEventListener("click", closeModal);

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modalEl.classList.contains("open")) {
          closeModal();
        }
      });

      window.addEventListener("hashchange", () => {
        const slug = window.location.hash.replace(/^#/, "");
        if (!slug) {
          closeModal();
          return;
        }
        if (getPetBySlug(slug)) {
          openPet(slug);
        }
      });

      boot();
    </script>
  </body>
</html>
