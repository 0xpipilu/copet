<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 104" width="100%" height="100%">
  <defs>
    <style>
      .sprite {
        transform: translate(0, 0);
      }
      @media (hover: hover) {
        svg:hover .sprite {
          animation: play-idle 1.1s steps(6) infinite;
        }
      }
      /* Hover fallback style */
      svg:hover .sprite {
        animation: play-idle 1.1s steps(6) infinite;
      }
      @keyframes play-idle {
        from { transform: translate(0, 0); }
        to { transform: translate(-576px, 0); }
      }
    </style>
  </defs>
  <g width="96" height="104" clip-path="url(#clip)">
    <clipPath id="clip">
      <rect width="96" height="104" />
    </clipPath>
    <image class="sprite" href="data:image/webp;base64," width="576" height="104" />
  </g>
</svg>
